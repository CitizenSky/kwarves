name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check Pages Enablement
        id: pages
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          status=$(curl -s -o /tmp/pages.json -w "%{http_code}" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/pages")
          if [ "$status" = "200" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
            echo "GitHub Pages is enabled."
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "GitHub Pages not enabled yet (HTTP ${status}). Skipping deploy."
          fi

      - name: Setup Pages
        if: ${{ steps.pages.outputs.enabled == 'true' }}
        uses: actions/configure-pages@v5

      - name: Upload artifact
        if: ${{ steps.pages.outputs.enabled == 'true' }}
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy
        if: ${{ steps.pages.outputs.enabled == 'true' }}
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Skip Notice
        if: ${{ steps.pages.outputs.enabled != 'true' }}
        run: echo "Skipped: Enable GitHub Pages in repository settings to publish the site."
